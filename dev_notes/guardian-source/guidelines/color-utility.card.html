<!-- @dsCard group="Colors" viewport="700x170" name="Utility & sub-brands" subtitle="Status colours, Labs (teal) & Special report (slate)" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
  .grp{margin-bottom:12px}
  .grp:last-child{margin-bottom:0}
  .grp h4{margin:0 0 6px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--neutral-46)}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .chip{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:#121212}
  .dot{width:22px;height:22px;border-radius:50%}
</style></head>
<body>
<div class="grp"><h4>Status</h4><div class="row">
  <div class="chip"><span class="dot" style="background:var(--error-400)"></span>Error #C70000</div>
  <div class="chip"><span class="dot" style="background:var(--success-400)"></span>Success #22874D</div>
  <div class="chip"><span class="dot" style="background:var(--focus-400)"></span>Focus #0077B6</div>
  <div class="chip"><span class="dot" style="background:var(--notification-blue-400)"></span>Notification #0190F7</div>
</div></div>
<div class="grp"><h4>Guardian Labs (sponsored)</h4><div class="row">
  <div class="chip"><span class="dot" style="background:var(--labs-100)"></span>100</div>
  <div class="chip"><span class="dot" style="background:var(--labs-200)"></span>200</div>
  <div class="chip"><span class="dot" style="background:var(--labs-400)"></span>400</div>
  <div class="chip"><span class="dot" style="background:var(--labs-600)"></span>600</div>
</div></div>
<div class="grp"><h4>Special report (investigations)</h4><div class="row">
  <div class="chip"><span class="dot" style="background:var(--special-report-100)"></span>100</div>
  <div class="chip"><span class="dot" style="background:var(--special-report-300)"></span>300</div>
  <div class="chip"><span class="dot" style="background:var(--special-report-500)"></span>500</div>
  <div class="chip"><span class="dot" style="background:var(--special-report-800)"></span>800</div>
</div></div>
</body></html>
