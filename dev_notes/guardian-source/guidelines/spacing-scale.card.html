<!-- @dsCard group="Spacing" viewport="700x180" name="Space scale" subtitle="4px base unit — space[n] = n × 4px" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
  .row{display:flex;align-items:flex-end;gap:14px}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--brand-400);width:24px}
  .lbl{font-size:10px;color:var(--neutral-46);font-weight:700}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="bar" style="height:var(--space-1)"></div><div class="lbl">1·4</div></div>
  <div class="item"><div class="bar" style="height:var(--space-2)"></div><div class="lbl">2·8</div></div>
  <div class="item"><div class="bar" style="height:var(--space-3)"></div><div class="lbl">3·12</div></div>
  <div class="item"><div class="bar" style="height:var(--space-4)"></div><div class="lbl">4·16</div></div>
  <div class="item"><div class="bar" style="height:var(--space-5)"></div><div class="lbl">5·20</div></div>
  <div class="item"><div class="bar" style="height:var(--space-6)"></div><div class="lbl">6·24</div></div>
  <div class="item"><div class="bar" style="height:var(--space-8)"></div><div class="lbl">8·32</div></div>
  <div class="item"><div class="bar" style="height:var(--space-9)"></div><div class="lbl">9·36</div></div>
  <div class="item"><div class="bar" style="height:var(--space-12)"></div><div class="lbl">12·48</div></div>
  <div class="item"><div class="bar" style="height:var(--space-16)"></div><div class="lbl">16·64</div></div>
</div>
</body></html>
