<!-- @dsCard group="Colors" viewport="700x170" name="Brand" subtitle="Guardian blue & the signature yellow" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
  .swatches{display:flex;gap:0;border-radius:4px;overflow:hidden}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;box-sizing:border-box}
  .sw b{font-size:12px;font-weight:700}
  .sw span{font-size:11px;opacity:.8}
  .grp{margin-bottom:14px}
  .grp h4{margin:0 0 8px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--neutral-46)}
</style></head>
<body>
<div class="grp"><h4>Brand — Guardian blue</h4>
<div class="swatches">
  <div class="sw" style="background:var(--brand-100);color:#fff"><b>100</b><span>#001536</span></div>
  <div class="sw" style="background:var(--brand-300);color:#fff"><b>300</b><span>#041F4A</span></div>
  <div class="sw" style="background:var(--brand-400);color:#fff"><b>400</b><span>#052962</span></div>
  <div class="sw" style="background:var(--brand-500);color:#fff"><b>500</b><span>#0077B6</span></div>
  <div class="sw" style="background:var(--brand-600);color:#fff"><b>600</b><span>#506991</span></div>
  <div class="sw" style="background:var(--brand-800);color:#052962"><b>800</b><span>#C1D8FC</span></div>
</div></div>
<div class="grp" style="margin-bottom:0"><h4>Brand alt — yellow</h4>
<div class="swatches">
  <div class="sw" style="background:var(--brand-alt-200);color:#121212"><b>200</b><span>#F3C100</span></div>
  <div class="sw" style="background:var(--brand-alt-300);color:#121212"><b>300</b><span>#FFD900</span></div>
  <div class="sw" style="background:var(--brand-alt-400);color:#121212"><b>400</b><span>#FFE500</span></div>
</div></div>
</body></html>
