<!-- @dsCard group="Colors" viewport="700x150" name="Neutral ramp" subtitle="Greys from ink to paper — named by lightness" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
  .row{display:flex;gap:0;border-radius:4px;overflow:hidden}
  .sw{flex:1;height:90px;display:flex;flex-direction:column;justify-content:flex-end;padding:6px 8px;box-sizing:border-box;font-size:10px;font-weight:700}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--neutral-0);color:#fff">0</div>
  <div class="sw" style="background:var(--neutral-7);color:#fff">7</div>
  <div class="sw" style="background:var(--neutral-20);color:#fff">20</div>
  <div class="sw" style="background:var(--neutral-38);color:#fff">38</div>
  <div class="sw" style="background:var(--neutral-46);color:#fff">46</div>
  <div class="sw" style="background:var(--neutral-60);color:#fff">60</div>
  <div class="sw" style="background:var(--neutral-73);color:#121212">73</div>
  <div class="sw" style="background:var(--neutral-86);color:#121212">86</div>
  <div class="sw" style="background:var(--neutral-93);color:#121212">93</div>
  <div class="sw" style="background:var(--neutral-97);color:#121212">97</div>
  <div class="sw" style="background:var(--neutral-100);color:#121212;box-shadow:inset 0 0 0 1px #ededed">100</div>
</div>
</body></html>
