<!-- @dsCard group="Colors" viewport="700x250" name="Pillars" subtitle="The five editorial colours — News, Opinion, Sport, Culture, Lifestyle" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
  .pillar{margin-bottom:10px}
  .pillar:last-child{margin-bottom:0}
  .name{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--neutral-46);margin-bottom:4px;font-weight:700}
  .row{display:flex;gap:0;border-radius:3px;overflow:hidden}
  .sw{flex:1;height:36px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
</style></head>
<body>
<div class="pillar"><div class="name">News</div><div class="row">
  <div class="sw" style="background:var(--news-100);color:#fff">100</div>
  <div class="sw" style="background:var(--news-300);color:#fff">300</div>
  <div class="sw" style="background:var(--news-400);color:#fff">400</div>
  <div class="sw" style="background:var(--news-500);color:#121212">500</div>
  <div class="sw" style="background:var(--news-600);color:#121212">600</div>
  <div class="sw" style="background:var(--news-800);color:#121212">800</div>
</div></div>
<div class="pillar"><div class="name">Opinion</div><div class="row">
  <div class="sw" style="background:var(--opinion-100);color:#fff">100</div>
  <div class="sw" style="background:var(--opinion-200);color:#fff">200</div>
  <div class="sw" style="background:var(--opinion-400);color:#fff">400</div>
  <div class="sw" style="background:var(--opinion-500);color:#121212">500</div>
  <div class="sw" style="background:var(--opinion-600);color:#121212">600</div>
  <div class="sw" style="background:var(--opinion-800);color:#121212">800</div>
</div></div>
<div class="pillar"><div class="name">Sport</div><div class="row">
  <div class="sw" style="background:var(--sport-100);color:#fff">100</div>
  <div class="sw" style="background:var(--sport-300);color:#fff">300</div>
  <div class="sw" style="background:var(--sport-400);color:#fff">400</div>
  <div class="sw" style="background:var(--sport-500);color:#121212">500</div>
  <div class="sw" style="background:var(--sport-600);color:#121212">600</div>
  <div class="sw" style="background:var(--sport-800);color:#121212">800</div>
</div></div>
<div class="pillar"><div class="name">Culture</div><div class="row">
  <div class="sw" style="background:var(--culture-100);color:#fff">100</div>
  <div class="sw" style="background:var(--culture-300);color:#fff">300</div>
  <div class="sw" style="background:var(--culture-400);color:#fff">400</div>
  <div class="sw" style="background:var(--culture-500);color:#121212">500</div>
  <div class="sw" style="background:var(--culture-600);color:#121212">600</div>
  <div class="sw" style="background:var(--culture-800);color:#121212">800</div>
</div></div>
<div class="pillar"><div class="name">Lifestyle</div><div class="row">
  <div class="sw" style="background:var(--lifestyle-100);color:#fff">100</div>
  <div class="sw" style="background:var(--lifestyle-300);color:#fff">300</div>
  <div class="sw" style="background:var(--lifestyle-400);color:#fff">400</div>
  <div class="sw" style="background:var(--lifestyle-450);color:#121212">450</div>
  <div class="sw" style="background:var(--lifestyle-500);color:#121212">500</div>
  <div class="sw" style="background:var(--lifestyle-800);color:#121212">800</div>
</div></div>
</body></html>
