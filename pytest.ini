[pytest]
# Put the repo root on sys.path so the top-level first-party modules
# (anomalies, db, briefing_pack, classifications, …) import under a bare
# `pytest` invocation, not only `python -m pytest` (which adds the CWD itself).
# Without this, a plain `pytest` — as a CI runner or a contributor would use —
# collects nothing but ModuleNotFoundError.
pythonpath = .
